name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit and embedded PostgreSQL tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Verify runtime configuration
        run: |
          pnpm runtime:verify
          docker compose --env-file .env.example config --quiet

  docker-cold-start:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Create isolated test environment
        run: |
          cat > .env.local <<'EOF'
          POSTGRES_DB=content_writing
          POSTGRES_USER=content_writer
          POSTGRES_PASSWORD=ci-only-password
          BACKUP_ENCRYPTION_KEY=abababababababababababababababababababababababababababababababababababababababababababababababababababababababababababababababab
          EOF

      - name: Build and cold-start the local stack
        run: docker compose --env-file .env.local up --detach --build --wait --wait-timeout 240

      - name: Verify API, worker and mock generation trace
        shell: bash
        run: |
          curl --fail --silent http://127.0.0.1:3100/api/v1/health | jq -e '.status == "ok"'
          curl --fail --silent http://127.0.0.1:3000 | grep -q '今天想写点什么'
          generation_id="$({
            curl --fail --silent \
              --request POST \
              --header 'content-type: application/json' \
              --data '{"capabilityKey":"article.write","input":{"topic":"CI cold start"}}' \
              http://127.0.0.1:3100/api/v1/generations
          } | jq -r '.id')"
          test -n "$generation_id"

          for attempt in $(seq 1 30); do
            response="$(curl --fail --silent "http://127.0.0.1:3100/api/v1/generations/$generation_id")"
            status="$(jq -r '.status' <<< "$response")"
            if [ "$status" = 'succeeded' ]; then
              jq -e '.outputText | length > 0' <<< "$response"
              exit 0
            fi
            if [ "$status" = 'failed' ] || [ "$status" = 'cancelled' ]; then
              jq . <<< "$response"
              exit 1
            fi
            sleep 2
          done
          echo 'Generation did not finish before timeout.' >&2
          exit 1

      - name: Print service diagnostics on failure
        if: failure()
        run: |
          docker compose --env-file .env.local ps
          docker compose --env-file .env.local logs --no-color --tail=300

      - name: Remove ephemeral CI data
        if: always()
        run: docker compose --env-file .env.local down --volumes --remove-orphans
