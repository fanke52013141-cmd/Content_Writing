name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit and embedded PostgreSQL tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Verify runtime configuration
        run: |
          pnpm runtime:verify
          docker compose --env-file .env.example config --quiet

  docker-cold-start:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Create isolated test environment
        run: |
          cat > .env.local <<'EOF'
          POSTGRES_DB=content_writing
          POSTGRES_USER=content_writer
          POSTGRES_PASSWORD=ci-only-password
          BACKUP_ENCRYPTION_KEY=abababababababababababababababababababababababababababababababababababababababababababababababababababababababababababababababab
          EOF

      - name: Build and cold-start the local stack
        shell: bash
        run: |
          docker compose --env-file .env.local up --detach --build
          ready=false
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3100/api/v1/health >/dev/null \
              && curl --fail --silent http://127.0.0.1:3000 >/dev/null; then
              ready=true
              break
            fi
            if docker compose --env-file .env.local ps --status exited --services \
              | grep -Ev '^migrate$' | grep -q .; then
              break
            fi
            sleep 2
          done
          if [ "$ready" != true ]; then
            docker compose --env-file .env.local ps
            exit 1
          fi

      - name: Verify API, worker and mock generation trace
        shell: bash
        run: |
          curl --fail --silent http://127.0.0.1:3100/api/v1/health | jq -e '.status == "ok"'
          curl --fail --silent http://127.0.0.1:3000 | grep -q '今天想写点什么'
          account_id="$(curl --fail --silent \
            --request POST \
            --header 'content-type: application/json' \
            --data '{"name":"CI 账号","description":"Docker cold-start acceptance"}' \
            http://127.0.0.1:3100/api/v1/accounts | jq -r '.id')"
          profile_id="$(curl --fail --silent \
            --request POST \
            --header 'content-type: application/json' \
            --data '{"positioningStatement":"帮助个人创作者稳定写作","targetAudience":"独立公众号创作者","valueProposition":"可执行的内容方法","contentPillars":["选题","写作"],"toneKeywords":["清晰"],"writingStyle":"先结论后论据","contentBoundaries":"不虚构事实","versionNote":"CI 验收"}' \
            "http://127.0.0.1:3100/api/v1/accounts/$account_id/profile-versions" | jq -r '.id')"
          curl --fail --silent \
            --request POST \
            "http://127.0.0.1:3100/api/v1/accounts/$account_id/profile-versions/$profile_id/activate" \
            | jq -e '.status == "active"'
          project_id="$(curl --fail --silent \
            --request POST \
            --header 'content-type: application/json' \
            --data "{\"title\":\"CI 创作项目\",\"creationOrigin\":\"idea\",\"originNote\":\"Docker cold-start acceptance\",\"primaryAccountId\":\"$account_id\"}" \
            http://127.0.0.1:3100/api/v1/projects | jq -r '.id')"
          curl --fail --silent \
            --request PATCH \
            --header 'content-type: application/json' \
            --data '{"status":"completed"}' \
            "http://127.0.0.1:3100/api/v1/projects/$project_id" \
            | jq -e '.status == "completed" and (.completedAt != null)'
          curl --fail --silent \
            --request DELETE \
            "http://127.0.0.1:3100/api/v1/projects/$project_id/accounts/$account_id" \
            | jq -e '.accountLinks | length == 0'
          topic_id="$(curl --fail --silent \
            --request POST \
            --header 'content-type: application/json' \
            --data "{\"accountId\":\"$account_id\",\"title\":\"CI 可复用选题\",\"angle\":\"从 Docker 冷启动验收切入\",\"targetAudience\":\"个人创作者\",\"contentGoal\":\"验证选题资产\",\"keywords\":[\"CI\",\"选题\"]}" \
            http://127.0.0.1:3100/api/v1/topics | jq -r '.id')"
          curl --fail --silent \
            --request PUT \
            --header 'content-type: application/json' \
            --data '{"isPrimary":true}' \
            "http://127.0.0.1:3100/api/v1/topics/$topic_id/projects/$project_id" \
            | jq -e --arg project_id "$project_id" \
              '.projectLinks == [{"projectId":$project_id,"projectTitle":"CI 创作项目","isPrimary":true}]'
          curl --fail --silent \
            --request DELETE \
            "http://127.0.0.1:3100/api/v1/topics/$topic_id/projects/$project_id" \
            | jq -e '.projectLinks | length == 0'
          curl --fail --silent \
            "http://127.0.0.1:3100/api/v1/topics/$topic_id" \
            | jq -e '.title == "CI 可复用选题" and .status == "active"'
          generation_id="$({
            curl --fail --silent \
              --request POST \
              --header 'content-type: application/json' \
              --data '{"capabilityKey":"article.write","input":{"topic":"CI cold start"}}' \
              http://127.0.0.1:3100/api/v1/generations
          } | jq -r '.id')"
          test -n "$generation_id"

          for attempt in $(seq 1 30); do
            response="$(curl --fail --silent "http://127.0.0.1:3100/api/v1/generations/$generation_id")"
            status="$(jq -r '.status' <<< "$response")"
            if [ "$status" = 'succeeded' ]; then
              jq -e '.outputText | length > 0' <<< "$response"
              exit 0
            fi
            if [ "$status" = 'failed' ] || [ "$status" = 'cancelled' ]; then
              jq . <<< "$response"
              exit 1
            fi
            sleep 2
          done
          echo 'Generation did not finish before timeout.' >&2
          exit 1

      - name: Print service diagnostics on failure
        if: failure()
        shell: bash
        run: |
          {
            echo '## Docker cold-start diagnostics'
            echo '```text'
            docker compose --env-file .env.local ps 2>&1
            docker compose --env-file .env.local logs --no-color --tail=300 2>&1
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
          status="$(docker compose --env-file .env.local ps --format json | head -c 4000 | tr '\n' ' ')"
          status="${status//'%'/'%25'}"
          echo "::error title=Docker cold-start failed::$status"
          for service in migrate api worker web postgres redis; do
            service_log="$(docker compose --env-file .env.local logs --no-color --tail=80 "$service" 2>&1 | tail -c 3500 | tr '\n' ' ')"
            service_log="${service_log//'%'/'%25'}"
            echo "::error title=$service logs::$service_log"
          done

      - name: Remove ephemeral CI data
        if: always()
        run: docker compose --env-file .env.local down --volumes --remove-orphans
